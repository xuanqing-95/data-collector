name: Data Collector

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests aiohttp
      
      - name: Run collector
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: python collector.py
      
      - name: Commit data
        run: |
          git config --global user.email "collector@github.com"
          git config --global user.name "Data Collector"
          git add data_*.json
          git commit -m "Update data $(date +%Y-%m-%d)" || echo "No new data"
          git push          
